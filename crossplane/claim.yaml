apiVersion: heimdall.siliconsaga.org/v1alpha1
kind: HeimdallStack
metadata:
  name: heimdall
  namespace: heimdall
spec:
  parameters:
    # environment and domain are sourced from EnvironmentConfig/cluster-identity
    # by the composition pipeline. Set them here only to override the cluster
    # default for this specific claim.
    thanosEnabled: false
    # Reduced from 15d → 7d as a stopgap until the S3/Garage backend lands;
    # tracks the 2026-05-15 Prometheus crashloop incident response. See
    # docs/plans/2026-05-19-heimdall-monitoring-design.md.
    retentionDays: 7
    storageSize: "20Gi"
    lokiStorageSize: "5Gi"
    tempoStorageSize: "5Gi"
