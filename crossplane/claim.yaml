apiVersion: heimdall.siliconsaga.org/v1alpha1
kind: HeimdallStack
metadata:
  name: heimdall
  namespace: heimdall
spec:
  parameters:
    # environment and domain are sourced from EnvironmentConfig/cluster-identity
    # by the composition pipeline. Set them here only to override the cluster
    # default for this specific claim.
    thanosEnabled: false
    retentionDays: 15
    storageSize: "10Gi"
    lokiStorageSize: "5Gi"
    tempoStorageSize: "5Gi"
