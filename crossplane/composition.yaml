apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xheimdallstack-lgtm
  labels:
    provider: grafana-lgtm
spec:
  mode: Pipeline
  compositeTypeRef:
    apiVersion: heimdall.siliconsaga.org/v1alpha1
    kind: XHeimdallStack
  pipeline:

  # ──────────────────────────────────────────────────────────
  # Step 0: Load cluster identity (environment, storageClass, domain)
  # Crossplane v2 requires a function call to populate the pipeline context;
  # the older `spec.environment.environmentConfigs` Composition field is gone.
  # Downstream templates read overrides from spec.parameters first, then fall
  # back to the EnvironmentConfig values via Sprig's `default`.
  # ──────────────────────────────────────────────────────────
  - step: load-cluster-identity
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Reference
          ref:
            name: cluster-identity

  # ──────────────────────────────────────────────────────────
  # Step 1: kube-prometheus-stack (Prometheus + Grafana + AlertManager)
  # ──────────────────────────────────────────────────────────
  - step: deploy-kube-prometheus-stack
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $env := .observed.composite.resource.spec.parameters.environment | default $identity.environment -}}
          {{- $storageClass := $identity.storageClass -}}
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-kube-prometheus
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: kube-prometheus-stack
          spec:
            forProvider:
              chart:
                name: kube-prometheus-stack
                repository: https://prometheus-community.github.io/helm-charts
                version: "82.16.0"
              namespace: heimdall
              values:
                prometheus:
                  prometheusSpec:
                    {{- if eq $env "gke" }}
                    replicas: 2
                    {{- else }}
                    replicas: 1
                    {{- end }}
                    retention: {{ .observed.composite.resource.spec.parameters.retentionDays | default 7 }}d
                    storageSpec:
                      volumeClaimTemplate:
                        spec:
                          storageClassName: {{ $storageClass }}
                          accessModes: ["ReadWriteOnce"]
                          resources:
                            requests:
                              storage: {{ .observed.composite.resource.spec.parameters.storageSize | default "10Gi" }}
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        cpu: "1"
                        memory: 2Gi
                grafana:
                  enabled: true
                  adminPassword: admin
                  sidecar:
                    datasources:
                      enabled: true
                  additionalDataSources:
                  - name: Loki
                    type: loki
                    url: http://{{ .observed.composite.resource.metadata.name }}-loki.heimdall.svc:3100
                    access: proxy
                    jsonData:
                      derivedFields:
                      - datasourceUid: tempo
                        matcherRegex: "traceID=(\\w+)"
                        name: TraceID
                        url: "$${__value.raw}"
                  - name: Tempo
                    type: tempo
                    uid: tempo
                    url: http://{{ .observed.composite.resource.metadata.name }}-tempo.heimdall.svc:3200
                    access: proxy
                    jsonData:
                      tracesToLogs:
                        datasourceUid: loki
                        filterByTraceID: true
                      serviceMap:
                        datasourceUid: prometheus
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
                alertmanager:
                  alertmanagerSpec:
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 250m
                        memory: 256Mi
                  config:
                    route:
                      group_by: ['alertname', 'namespace']
                      group_wait: 30s
                      group_interval: 5m
                      repeat_interval: 4h
                      receiver: ntfy-warning
                      routes:
                        - matchers: ['severity = "critical"']
                          receiver: ntfy-critical
                          repeat_interval: 1h
                    receivers:
                      - name: ntfy-warning
                        webhook_configs:
                          - url: "http://ntfy.ntfy.svc.cluster.local/heimdall-alerts"
                            send_resolved: true
                      - name: ntfy-critical
                        webhook_configs:
                          - url: "http://ntfy.ntfy.svc.cluster.local/heimdall-alerts"
                            send_resolved: true
                          {{- if .observed.composite.resource.spec.parameters.knarrWebhookUrl }}
                          - url: "{{ .observed.composite.resource.spec.parameters.knarrWebhookUrl }}"
                            send_resolved: true
                          {{- end }}

  # ──────────────────────────────────────────────────────────
  # Step 2: Loki (Log Aggregation)
  # ──────────────────────────────────────────────────────────
  - step: deploy-loki
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $storageClass := $identity.storageClass -}}
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-loki
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: loki
          spec:
            forProvider:
              chart:
                name: loki
                repository: https://grafana.github.io/helm-charts
                version: "6.55.0"
              namespace: heimdall
              values:
                deploymentMode: SingleBinary
                loki:
                  auth_enabled: false
                  commonConfig:
                    replication_factor: 1
                  schemaConfig:
                    configs:
                    - from: "2024-04-01"
                      store: tsdb
                      object_store: filesystem
                      schema: v13
                      index:
                        prefix: index_
                        period: 24h
                  storage:
                    type: filesystem
                  limits_config:
                    retention_period: {{ .observed.composite.resource.spec.parameters.retentionDays | default 7 }}d
                  compactor:
                    retention_enabled: true
                    delete_request_store: filesystem
                singleBinary:
                  replicas: 1
                  persistence:
                    enabled: true
                    storageClass: {{ $storageClass }}
                    size: {{ .observed.composite.resource.spec.parameters.lokiStorageSize | default "5Gi" }}
                  resources:
                    requests:
                      cpu: 250m
                      memory: 256Mi
                    limits:
                      cpu: "1"
                      memory: 1Gi
                # Disable components not needed in SingleBinary mode
                read:
                  replicas: 0
                write:
                  replicas: 0
                backend:
                  replicas: 0
                gateway:
                  enabled: false
                chunksCache:
                  enabled: false
                resultsCache:
                  enabled: false

  # ──────────────────────────────────────────────────────────
  # Step 3: Tempo (Distributed Tracing)
  # ──────────────────────────────────────────────────────────
  - step: deploy-tempo
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $storageClass := $identity.storageClass -}}
          apiVersion: helm.crossplane.io/v1beta1
          kind: Release
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-tempo
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: tempo
          spec:
            forProvider:
              chart:
                name: tempo
                repository: https://grafana.github.io/helm-charts
                version: "1.24.4"
              namespace: heimdall
              values:
                tempo:
                  retention: {{ mul (.observed.composite.resource.spec.parameters.retentionDays | default 7) 24 }}h
                  receivers:
                    otlp:
                      protocols:
                        grpc:
                          endpoint: "0.0.0.0:4317"
                        http:
                          endpoint: "0.0.0.0:4318"
                  storage:
                    trace:
                      backend: local
                      local:
                        path: /var/tempo/traces
                persistence:
                  enabled: true
                  storageClassName: {{ $storageClass }}
                  size: {{ .observed.composite.resource.spec.parameters.tempoStorageSize | default "5Gi" }}
                resources:
                  requests:
                    cpu: 250m
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi

  # ──────────────────────────────────────────────────────────
  # Step 3.5: Self-health PrometheusRules
  #
  # Heimdall-scoped alerts that would have caught the 2026-05-15 GKE
  # crashloop (4d18h, 1328 + 275 restarts, full WAL) before users noticed.
  # The chart's default rules cover this in the general case
  # (KubePersistentVolumeFillingUp etc.) but fire across the whole cluster;
  # these are namespace-pinned with heimdall-specific labels for clean
  # routing once AlertManager notifications land in a follow-up arc.
  #
  # The `release: <name>-kube-prometheus` label matches the kube-prometheus-
  # stack default `ruleSelectorNilUsesHelmValues: true` so the operator
  # picks the rule up automatically.
  # ──────────────────────────────────────────────────────────
  - step: deploy-self-health-rules
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $name := .observed.composite.resource.metadata.name -}}
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ $name }}-self-health-rules
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: self-health-rules
          spec:
            forProvider:
              manifest:
                apiVersion: monitoring.coreos.com/v1
                kind: PrometheusRule
                metadata:
                  name: heimdall-self-health
                  namespace: heimdall
                  labels:
                    release: {{ $name }}-kube-prometheus
                    app.kubernetes.io/part-of: heimdall
                    app.kubernetes.io/component: alert-rules
                spec:
                  groups:
                  - name: heimdall.pvc-fill
                    interval: 1m
                    rules:
                    - alert: HeimdallPVCFillingUp
                      expr: |
                        (kubelet_volume_stats_used_bytes{namespace="heimdall"}
                         / kubelet_volume_stats_capacity_bytes{namespace="heimdall"}) > 0.80
                      for: 15m
                      labels:
                        severity: warning
                        component: heimdall
                      annotations:
                        summary: {{ `Heimdall PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full` | quote }}
                        description: {{ `PVC {{ $labels.persistentvolumeclaim }} in the heimdall namespace has been above 80% utilization for 15 minutes. This is the precursor to the 2026-05-15 Prometheus WAL-full crashloop incident — investigate disk pressure, retention settings, or expand the PVC.` | quote }}
                    - alert: HeimdallPVCCritical
                      expr: |
                        (kubelet_volume_stats_used_bytes{namespace="heimdall"}
                         / kubelet_volume_stats_capacity_bytes{namespace="heimdall"}) > 0.90
                      for: 5m
                      labels:
                        severity: critical
                        component: heimdall
                      annotations:
                        summary: {{ `Heimdall PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full — imminent out-of-space` | quote }}
                        description: {{ `PVC {{ $labels.persistentvolumeclaim }} above 90% utilization for 5 minutes. Out-of-space and pod crashloop are imminent. Expand the PVC immediately or reduce retentionDays.` | quote }}
                  - name: heimdall.prometheus-health
                    interval: 1m
                    rules:
                    - alert: HeimdallPrometheusRestartStorm
                      expr: |
                        changes(kube_pod_container_status_restarts_total{
                          namespace="heimdall",
                          container="prometheus"
                        }[15m]) > 3
                      for: 0m
                      labels:
                        severity: critical
                        component: heimdall
                      annotations:
                        summary: {{ `Prometheus pod {{ $labels.pod }} restarted more than 3 times in 15 minutes` | quote }}
                        description: {{ `The pod restarted {{ $value }} times in 15 minutes — restart-storm pattern. Check pod logs for "no space left on device", WAL corruption, or OOMKilled. Matches the 2026-05-15 incident shape.` | quote }}
                    - alert: HeimdallPrometheusWALCorruption
                      expr: increase(prometheus_tsdb_wal_corruptions_total{namespace="heimdall"}[10m]) > 0
                      for: 0m
                      labels:
                        severity: critical
                        component: heimdall
                      annotations:
                        summary: {{ `Prometheus TSDB WAL corruption detected on {{ $labels.instance }}` | quote }}
                        description: {{ `{{ $value }} WAL corruption events reported in the last 10 minutes. Data loss likely; investigate disk health and Prometheus logs.` | quote }}
                    - alert: HeimdallPrometheusTSDBCompactionFailures
                      expr: increase(prometheus_tsdb_compactions_failed_total{namespace="heimdall"}[1h]) > 0
                      for: 0m
                      labels:
                        severity: warning
                        component: heimdall
                      annotations:
                        summary: {{ `Prometheus TSDB compaction failures on {{ $labels.instance }}` | quote }}
                        description: {{ `{{ $value }} compaction failures in the last hour. Often a precursor to disk pressure or storage backend issues.` | quote }}

  # ──────────────────────────────────────────────────────────
  # Step 4: Ingress Routes (Traefik IngressRoute)
  # ──────────────────────────────────────────────────────────
  - step: deploy-ingress-routes
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $identity := index .context "apiextensions.crossplane.io/environment" -}}
          {{- $domain := .observed.composite.resource.spec.parameters.domain | default $identity.domain -}}
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-grafana-ingress
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: grafana-ingress
          spec:
            forProvider:
              manifest:
                apiVersion: traefik.io/v1alpha1
                kind: IngressRoute
                metadata:
                  name: grafana
                  namespace: heimdall
                spec:
                  entryPoints:
                    - web
                    - websecure
                  routes:
                    - match: Host(`grafana.{{ $domain }}`)
                      kind: Rule
                      services:
                        - name: {{ .observed.composite.resource.metadata.name }}-kube-prometheus-grafana
                          port: 80
          ---
          apiVersion: kubernetes.crossplane.io/v1alpha2
          kind: Object
          metadata:
            name: {{ .observed.composite.resource.metadata.name }}-prometheus-ingress
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: prometheus-ingress
          spec:
            forProvider:
              manifest:
                apiVersion: traefik.io/v1alpha1
                kind: IngressRoute
                metadata:
                  name: prometheus
                  namespace: heimdall
                spec:
                  entryPoints:
                    - web
                  routes:
                    - match: Host(`prometheus.{{ $domain }}`)
                      kind: Rule
                      services:
                        - name: {{ .observed.composite.resource.metadata.name }}-kube-promet-prometheus
                          port: 9090

  # ──────────────────────────────────────────────────────────
  # Step 5: Auto-ready
  # ──────────────────────────────────────────────────────────
  - step: auto-ready
    functionRef:
      name: function-auto-ready
