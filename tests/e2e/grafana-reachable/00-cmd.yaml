# Assert Grafana pod is Running and Ready
apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |
      set -e

      # Find the Grafana pod dynamically
      GRAFANA_POD=$(kubectl get pods -n heimdall -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].metadata.name}')

      if [ -z "$GRAFANA_POD" ]; then
        echo "FAIL: No Grafana pod found"
        exit 1
      fi

      echo "Found Grafana pod: $GRAFANA_POD"

      # Check Grafana health endpoint
      HEALTH=$(kubectl exec -n heimdall "$GRAFANA_POD" -c grafana -- \
        wget -qO- http://localhost:3000/api/health 2>/dev/null)

      echo "Grafana health response: $HEALTH"

      if echo "$HEALTH" | grep -q '"database": "ok"'; then
        echo "PASS: Grafana is healthy"
      else
        echo "FAIL: Grafana health check failed"
        exit 1
      fi

      # Read Grafana admin password from the deployed Secret
      GRAFANA_PW=$(kubectl get secret -n heimdall \
        -l app.kubernetes.io/name=grafana \
        -o jsonpath='{.items[0].data.admin-password}' | base64 -d)

      # Check that Prometheus, Loki, and Tempo data sources exist
      # Use Authorization header instead of URL credentials (safe for special chars)
      AUTH_HEADER="Authorization: Basic $(printf 'admin:%s' "$GRAFANA_PW" | base64 -w0)"
      DATASOURCES=$(kubectl exec -n heimdall "$GRAFANA_POD" -c grafana -- \
        wget -qO- --header="$AUTH_HEADER" http://localhost:3000/api/datasources 2>/dev/null)

      echo "Data sources: $DATASOURCES"

      for DS in Prometheus Loki Tempo; do
        if echo "$DATASOURCES" | grep -qE "\"name\"[[:space:]]*:[[:space:]]*\"$DS\""; then
          echo "PASS: $DS data source configured"
        else
          echo "FAIL: $DS data source not found"
          exit 1
        fi
      done

      echo "All data source checks passed."
